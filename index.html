     .topbar {

      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 12px 16px;

.topbar-title {
      font-size: 1.5rem;
      font-weight: 800;
      white-space: nowrap;
      
      overflow: hidden;
      text-overflow: ellipsis;
    }

.topbar-title span { color: var(--accent); }

.topbar-sub {

      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

.badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(34,197,94,.1);
  border: 1px solid rgba(34,197,94,.3);
  border-radius: 50px;
  padding: 4px 12px;
  font-size: .68rem;
  color: #22c55e;
}
.badge.off { background: rgba(100,116,139,.1); border-color: rgba(100,116,139,.3); color: #64748b; }

.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #22c55e;
  animation: blink 1.3s ease-in-out infinite;
}
.badge.off .dot { background: #64748b; animation: none; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

<script type="module">

  // ── SUBSTITUA PELOS SEUS DADOS DO FIREBASE ──

     //L.circleMarker([-5.654135, -36.613553], {radius: 3}).addTo(map);

  const busIcon = L.divIcon({
    html: `<div style="
      background:linear-gradient(135deg,#f97316,#fbbf24);
      border-radius:50%;width:42px;height:42px;
      display:flex;align-items:center;justify-content:center;font-size:20px;
      box-shadow:0 0 0 4px rgba(249,115,22,.3),0 4px 16px rgba(249,115,22,.5);
      border:3px solid #fff;">🚌</div>`,
    className: '', iconSize: [42, 42], iconAnchor: [21, 21]
  });

 
  //  let marker, firstLoad = true;

  marker = L.marker([0, 0], { icon: busIcon });

  // ── Firebase ──────────────────────────────────
  const status  = document.getElementById('status');
  const badge   = document.getElementById('badge');
  const badgeText = document.getElementById('badgeText');
  let offlineTimer;

  onValue(
    ref(db, 'buses/' + busId),
    (snap) => {
      clearTimeout(offlineTimer);

      if (!snap.exists()) {
        setOffline('Sem dados para esta linha.');
        return;
      }

      const { lat, lng } = snap.val();
      if (lat == null || lng == null) { setOffline('Coordenadas ausentes.'); return; }

      // Atualiza UI
      document.getElementById('lat').textContent = lat.toFixed(6);
      document.getElementById('lng').textContent = lng.toFixed(6);
      status.textContent = 'Atualizado às ' + new Date().toLocaleTimeString('pt-BR');
      status.className = 'status ok';
      badge.className = 'badge';
      badgeText.textContent = 'AO VIVO';

      // Atualiza mapa
      const pos = [lat, lng];
      marker.setLatLng(pos);
      if (!map.hasLayer(marker)) marker.addTo(map);
      if (firstLoad) { map.setView(pos, 16); firstLoad = false; }

      offlineTimer = setTimeout(() => setOffline('Sem atualização há mais de 30s.'), 30000);
    },
    (err) => setOffline('Erro: ' + err.message)
  );

  function setOffline(msg) {
    status.textContent = msg;
    status.className = 'status err';
    badge.className = 'badge off';
    badgeText.textContent = 'OFFLINE';
  }

  window.centerMap = function () {
    if (marker && map.hasLayer(marker)) {
      map.flyTo(marker.getLatLng(), 16, { animate: true, duration: 1 });
    }
  };
</script>
