<body>
  <h1>🚌 Ônibus <span id="lineLabel">—</span></h1>

  <div class="box">
    <div class="label">Latitude</div>
    <div class="value" id="lat">—</div>
  </div>

  <div class="box">
    <div class="label">Longitude</div>
    <div class="value" id="lng">—</div>
  </div>

  <div class="status" id="status">Aguardando dados…</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ── SUBSTITUA PELOS SEUS DADOS DO FIREBASE ──
    const firebaseConfig = {
apiKey: "AIzaSyDmjnJhMGaK48EDMU8NnJDGbYTMN7hBbnU",
    authDomain: "circular-ufersa.firebaseapp.com",
    projectId: "circular-ufersa",
    storageBucket: "circular-ufersa.firebasestorage.app",
    messagingSenderId: "479839491222",
    appId: "1:479839491222:web:8849e08b6d5c8d66dbdeb7"
      
     
    };
    // ────────────────────────────────────────────

    const db = getDatabase(initializeApp(firebaseConfig));

    const busId = new URLSearchParams(location.search).get('bus') || 'LINHA-101';
    document.getElementById('lineLabel').textContent = busId;

    const status = document.getElementById('status');

    onValue(
      ref(db, 'buses/' + busId),
      (snap) => {
        if (!snap.exists()) {
          status.textContent = 'Sem dados para esta linha.';
          status.className = 'status err';
          return;
        }
        const { lat, lng } = snap.val();
        document.getElementById('lat').textContent = lat != null ? lat.toFixed(6) : '—';
        document.getElementById('lng').textContent = lng != null ? lng.toFixed(6) : '—';
        status.textContent = 'Atualizado às ' + new Date().toLocaleTimeString('pt-BR');
        status.className = 'status ok';
      },
      (err) => {
        status.textContent = 'Erro: ' + err.message;
        status.className = 'status err';
      }
    );
  </script>

</body>
</html>
