:root {
  --bg: #0a0f1e;
  --surface: #111827;
  --accent: #f97316;
  --accent2: #fbbf24;
  --text: #f1f5f9;
  --muted: #64748b;
  --ok: #22c55e;
  --danger: #ef4444;
  --border: #1e293b;
}

html, body {
  height: 100%;
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ── LAYOUT ─────────────────────────────────────── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── TOP BAR ────────────────────────────────────── */
.topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 500;
}

.bus-emoji { font-size: 28px; flex-shrink: 0; }

.topbar-info { flex: 1; min-width: 0; }

.topbar-title {
  font-size: 1rem;
  font-weight: 800;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-title span { color: var(--accent); }

.topbar-sub {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(34,197,94,.12);
  border: 1px solid rgba(34,197,94,.3);
  border-radius: 50px;
  padding: 5px 12px;
  flex-shrink: 0;
}

.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--ok);
  animation: blink 1.3s ease-in-out infinite;
}

.live-dot.offline { background: var(--muted); animation: none; }
.live-dot.error   { background: var(--danger); animation: none; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: .3; }
}

.live-label {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  font-weight: 500;
  color: var(--ok);
  letter-spacing: .06em;
}

.live-label.offline { color: var(--muted); }
.live-label.error   { color: var(--danger); }

/* ── MAP ───────────────────────────────────────── */
#map {
  flex: 1;
  z-index: 1;
}

/* dark Leaflet tiles via CSS filter */
.leaflet-tile { filter: brightness(.85) saturate(.9) hue-rotate(195deg) contrast(1.05); }
.leaflet-container { background: var(--bg); }

/* ── BOTTOM PANEL ───────────────────────────────── */
.bottom-panel {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 14px 16px;
  z-index: 500;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.info-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
}

.info-box-label {
  font-family: 'DM Mono', monospace;
  font-size: .58rem;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.info-box-val {
  font-family: 'DM Mono', monospace;
  font-size: .82rem;
  font-weight: 500;
  color: var(--accent2);
}

.center-btn {
  margin-top: 10px;
  width: 100%;
  padding: 11px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0a0f1e;
  border: none;
  border-radius: 10px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: .9rem;
  cursor: pointer;
  transition: opacity .2s;
}

.center-btn:hover { opacity: .88; }

/* ── SEARCH BAR (shown when no ?bus= param) ──────── */
.search-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  gap: 20px;
}

.search-overlay .big-icon {
  font-size: 64px;
  filter: drop-shadow(0 0 30px rgba(249,115,22,.5));
}

.search-overlay h1 {
  font-size: clamp(1.5rem, 6vw, 2.2rem);
  font-weight: 800;
  text-align: center;
  letter-spacing: -.03em;
}

.search-overlay h1 span { color: var(--accent); }

.search-box {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 380px;
}

.search-box input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 1rem;
  padding: 14px 16px;
  outline: none;
  transition: border-color .2s;
}

.search-box input:focus { border-color: var(--accent); }

.search-box button {
  padding: 14px 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0a0f1e;
  border: none;
  border-radius: 12px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  cursor: pointer;
}

/* ── OFFLINE MSG ─────────────────────────────────── */
.offline-banner {
  position: absolute;
  top: 70px; left: 50%;
  transform: translateX(-50%);
  background: rgba(239,68,68,.15);
  border: 1px solid rgba(239,68,68,.4);
  color: #fca5a5;
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  padding: 8px 18px;
  border-radius: 50px;
  z-index: 600;
  display: none;
  text-align: center;
  white-space: nowrap;
}

@media (max-width: 400px) {
  .info-grid { grid-template-columns: repeat(2, 1fr); }
}

<body>

<!-- Search overlay shown when no bus ID in URL -->

<div class="search-overlay" id="searchOverlay" style="display:none">
  <span class="big-icon">🚌</span>
  <h1>Rastrear <span>Ônibus</span></h1>
  <p style="color:var(--muted);font-family:'DM Mono',monospace;font-size:.8rem;text-align:center">Insira o código da linha fornecido pelo motorista</p>
  <div class="search-box">
    <input type="text" id="busInput" placeholder="Ex: LINHA-101" maxlength="20"/>
    <button onclick="goTrack()">Ir</button>
  </div>
</div>

<div class="app" id="appShell" style="display:none">
  <!-- Top bar -->
  <div class="topbar">
    <span class="bus-emoji">🚌</span>
    <div class="topbar-info">
      <div class="topbar-title">Linha <span id="lineLabel">—</span></div>
      <div class="topbar-sub" id="lastUpdate">Aguardando dados…</div>
    </div>
    <div class="live-badge">
      <div class="live-dot offline" id="liveDot"></div>
      <span class="live-label offline" id="liveLabel">OFFLINE</span>
    </div>
  </div>

  <!-- Map -->

  <div id="map"></div>
  <div class="offline-banner" id="offlineBanner">⚠ Motorista offline ou sem dados</div>

  <!-- Bottom panel -->

  <div class="bottom-panel">
    <div class="info-grid">
      <div class="info-box">
        <div class="info-box-label">Latitude</div>
        <div class="info-box-val" id="pLatVal">—</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Longitude</div>
        <div class="info-box-val" id="pLngVal">—</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Precisão</div>
        <div class="info-box-val" id="pAccVal">—</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Velocidade</div>
        <div class="info-box-val" id="pSpdVal">—</div>
      </div>
    </div>
    <button class="center-btn" onclick="centerMap()">📍 Centralizar no Ônibus</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ─── CONFIGURE SUA CHAVE DO FIREBASE AQUI ──────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyDmjnJhMGaK48EDMU8NnJDGbYTMN7hBbnU",
    authDomain: "circular-ufersa.firebaseapp.com",
    projectId: "circular-ufersa",
    storageBucket: "circular-ufersa.firebasestorage.app",
    messagingSenderId: "479839491222",
    appId: "1:479839491222:web:8849e08b6d5c8d66dbdeb7"
  };
  // ────────────────────────────────────────────────────────────────────────

  // ── Inicializa Firebase ─────────────────────────────
  let db;
  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
  } catch (e) {
    showFatalError('Falha ao inicializar o Firebase. Verifique se o firebaseConfig está correto.<br><code>' + e.message + '</code>');
  }

  // ── Lê o parâmetro ?bus= da URL ─────────────────────
  const params = new URLSearchParams(location.search);
  const busId = params.get('bus');

  if (!busId) {
    document.getElementById('searchOverlay').style.display = 'flex';
  } else if (db) {
    startPassengerView(busId);
  }

  // ── Funções globais chamadas pelo HTML ──────────────
  // (expostas em window para funcionar com type="module")
  let map, busMarker, firstLoad = true;

  window.goTrack = function () {
    const val = document.getElementById('busInput').value.trim();
    if (!val) return;
    location.href = location.pathname + '?bus=' + encodeURIComponent(val);
  };

  window.centerMap = function () {
    if (busMarker && map && map.hasLayer(busMarker)) {
      map.flyTo(busMarker.getLatLng(), 16, { animate: true, duration: 1 });
    }
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.goTrack();
  });

  // ── View do passageiro ──────────────────────────────
  function startPassengerView(id) {
    document.getElementById('appShell').style.display = 'flex';
    document.getElementById('lineLabel').textContent = id;

    // Inicializa o mapa
    map = L.map('map', { zoomControl: true, attributionControl: false })
           .setView([-15.8, -47.9], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 })
     .addTo(map);

    const busIcon = L.divIcon({
      html: `<div style="
        background:linear-gradient(135deg,#f97316,#fbbf24);
        border-radius:50%;width:44px;height:44px;
        display:flex;align-items:center;justify-content:center;
        font-size:22px;
        box-shadow:0 0 0 4px rgba(249,115,22,.3),0 4px 20px rgba(249,115,22,.5);
        border:3px solid #fff;">🚌</div>`,
      className: '',
      iconSize: [44, 44],
      iconAnchor: [22, 22]
    });

    busMarker = L.marker([0, 0], { icon: busIcon });

    // ── Escuta o Firebase em tempo real ────────────────
    const busRef = ref(db, 'buses/' + id);
    let offlineTimer;

    onValue(
      busRef,
      // Callback de SUCESSO
      (snap) => {
        clearTimeout(offlineTimer);

        if (!snap.exists()) {
          setOffline('Nenhum dado encontrado para "' + id + '". O motorista já iniciou a transmissão?');
          return;
        }

        const data = snap.val();
        const lat = data.lat;
        const lng = data.lng;
        const accuracy = data.accuracy;
        const speed = data.speed;

        if (lat == null || lng == null) {
          setOffline('Dados recebidos, mas coordenadas ausentes.');
          return;
        }

        setOnline();

        const pos = [lat, lng];
        busMarker.setLatLng(pos);
        if (!map.hasLayer(busMarker)) busMarker.addTo(map);
        if (firstLoad) { map.setView(pos, 16); firstLoad = false; }

        document.getElementById('pLatVal').textContent = lat.toFixed(5);
        document.getElementById('pLngVal').textContent = lng.toFixed(5);
        document.getElementById('pAccVal').textContent = accuracy != null ? Math.round(accuracy) + ' m' : '—';
        document.getElementById('pSpdVal').textContent = speed != null ? speed.toFixed(1) + ' km/h' : '—';
        document.getElementById('lastUpdate').textContent =
          'Atualizado às ' + new Date().toLocaleTimeString('pt-BR');

        offlineTimer = setTimeout(() =>
          setOffline('Sem atualização há mais de 30s. Motorista pode ter parado.'), 30000);
      },
      // Callback de ERRO (ex: regras de segurança bloqueando leitura)
      (error) => {
        let msg = error.message || error.code || String(error);
        // Mensagem amigável para o erro mais comum
        if (msg.includes('Permission denied') || msg.includes('PERMISSION_DENIED')) {
          msg = 'Permissão negada pelo Firebase.<br>'
              + 'Vá em <b>Firebase Console → Realtime Database → Regras</b> e mude para:<br>'
              + '<code>{ "rules": { ".read": true, ".write": true } }</code>';
        }
        showFatalError('Erro ao ler o Firebase:<br>' + msg);
      }
    );
  }

  // ── Helpers de estado ───────────────────────────────
  function setOnline() {
    document.getElementById('liveDot').className = 'live-dot';
    document.getElementById('liveLabel').className = 'live-label';
    document.getElementById('liveLabel').textContent = 'AO VIVO';
    document.getElementById('offlineBanner').style.display = 'none';
  }

  function setOffline(msg) {
    document.getElementById('liveDot').className = 'live-dot offline';
    document.getElementById('liveLabel').className = 'live-label offline';
    document.getElementById('liveLabel').textContent = 'OFFLINE';
    const banner = document.getElementById('offlineBanner');
    banner.innerHTML = '⚠ ' + msg;
    banner.style.display = 'block';
    banner.style.whiteSpace = 'normal';
    banner.style.maxWidth = '90vw';
  }

  function showFatalError(html) {
    document.getElementById('searchOverlay').style.display = 'none';
    document.getElementById('appShell').style.display = 'none';
    let el = document.getElementById('fatalError');
    if (!el) {
      el = document.createElement('div');
      el.id = 'fatalError';
      el.style.cssText = `
        position:fixed;inset:0;background:#0a0f1e;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        padding:32px 20px;gap:16px;z-index:9999;font-family:'Syne',sans-serif;color:#f1f5f9;
        text-align:center;`;
      document.body.appendChild(el);
    }
    el.innerHTML = `
      <div style="font-size:48px">⚠️</div>
      <div style="font-size:1.2rem;font-weight:800;color:#ef4444">Erro de Conexão</div>
      <div style="font-size:.85rem;color:#94a3b8;max-width:420px;line-height:1.6">${html}</div>
      <button onclick="location.reload()"
        style="margin-top:8px;padding:12px 28px;background:#f97316;color:#0a0f1e;
               border:none;border-radius:10px;font-family:'Syne',sans-serif;
               font-weight:800;font-size:.9rem;cursor:pointer;">
        Tentar novamente
      </button>`;
  }
</script>

</body>
