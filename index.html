<html>
<head>
    <title>Localização em Tempo Real</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database-compat.js"></script>

    <script>
       
            const firebaseConfig = {
  apiKey: "AIzaSyD9Qz_EQwwLbseGGEOPTSw6LokZtr7C7p4",
  authDomain: "circularcma-bae6c.firebaseapp.com",
  databaseURL: "https://circularcma-bae6c-default-rtdb.firebaseio.com",
  projectId: "circularcma-bae6c",
  storageBucket: "circularcma-bae6c.firebasestorage.app",
  messagingSenderId: "449165898696",
  appId: "1:449165898696:web:c577cf6fbc140536e2c6fd"
};
     
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Inicializa o mapa focado no Brasil (ou sua cidade)
        const map = L.map('map').setView([-23.55, -46.63], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let marcadorOnibus = null;

        // Escuta o Firebase em tempo real
        db.ref('bus/LINHA-101').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const { lat, lng } = data;

                if (marcadorOnibus) {
                    marcadorOnibus.setLatLng([lat, lng]); // Move o ícone suavemente
                } else {
                    marcadorOnibus = L.marker([lat, lng]).addTo(map).bindPopup("Ônibus 001");
                }
                map.panTo([lat, lng]); // Centraliza o mapa no ônibus
            }
        });
    </script>
</body>
</html>
