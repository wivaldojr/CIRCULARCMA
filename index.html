<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Localização do Ônibus</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --accent: #f97316;
      --accent2: #fbbf24;
      --text: #f1f5f9;
      --muted: #64748b;
      --ok: #22c55e;
      --danger: #ef4444;
      --border: #1e293b;
    }

    html, body {
      height: 100%;
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── LAYOUT ─────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── TOP BAR ────────────────────────────────────── */
    .topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 500;
    }

    .bus-emoji { font-size: 28px; flex-shrink: 0; }

    .topbar-info { flex: 1; min-width: 0; }

    .topbar-title {
      font-size: 1rem;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-title span { color: var(--accent); }

    .topbar-sub {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(34,197,94,.12);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 50px;
      padding: 5px 12px;
      flex-shrink: 0;
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--ok);
      animation: blink 1.3s ease-in-out infinite;
    }

    .live-dot.offline { background: var(--muted); animation: none; }
    .live-dot.error   { background: var(--danger); animation: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }

    .live-label {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      font-weight: 500;
      color: var(--ok);
      letter-spacing: .06em;
    }

    .live-label.offline { color: var(--muted); }
    .live-label.error   { color: var(--danger); }

    /* ── MAP ───────────────────────────────────────── */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* dark Leaflet tiles via CSS filter */
    .leaflet-tile { filter: brightness(.85) saturate(.9) hue-rotate(195deg) contrast(1.05); }
    .leaflet-container { background: var(--bg); }

    /* ── BOTTOM PANEL ───────────────────────────────── */
    .bottom-panel {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      z-index: 500;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .info-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }

    .info-box-label {
      font-family: 'DM Mono', monospace;
      font-size: .58rem;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .info-box-val {
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      font-weight: 500;
      color: var(--accent2);
    }

    .center-btn {
      margin-top: 10px;
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0f1e;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: .9rem;
      cursor: pointer;
      transition: opacity .2s;
    }

    .center-btn:hover { opacity: .88; }

    /* ── SEARCH BAR (shown when no ?bus= param) ──────── */
    .search-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      gap: 20px;
    }

    .search-overlay .big-icon {
      font-size: 64px;
      filter: drop-shadow(0 0 30px rgba(249,115,22,.5));
    }

    .search-overlay h1 {
      font-size: clamp(1.5rem, 6vw, 2.2rem);
      font-weight: 800;
      text-align: center;
      letter-spacing: -.03em;
    }

    .search-overlay h1 span { color: var(--accent); }

    .search-box {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 380px;
    }

    .search-box input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color .2s;
    }

    .search-box input:focus { border-color: var(--accent); }

    .search-box button {
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0f1e;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
    }

    /* ── OFFLINE MSG ─────────────────────────────────── */
    .offline-banner {
      position: absolute;
      top: 70px; left: 50%;
      transform: translateX(-50%);
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.4);
      color: #fca5a5;
      font-family: 'DM Mono', monospace;
      font-size: .75rem;
      padding: 8px 18px;
      border-radius: 50px;
      z-index: 600;
      display: none;
      text-align: center;
      white-space: nowrap;
    }

    @media (max-width: 400px) {
      .info-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- Search overlay shown when no bus ID in URL -->
<div class="search-overlay" id="searchOverlay" style="display:none">
  <span class="big-icon">🚌</span>
  <h1>Rastrear <span>Ônibus</span></h1>
  <p style="color:var(--muted);font-family:'DM Mono',monospace;font-size:.8rem;text-align:center">Insira o código da linha fornecido pelo motorista</p>
  <div class="search-box">
    <input type="text" id="busInput" placeholder="Ex: CIRCULAR" maxlength="20" value="CIRCULAR"/>
    <button onclick="goTrack()">Ir</button>
  </div>
</div>

<div class="app" id="appShell" style="display:none">
  <!-- Top bar -->
  <div class="topbar">
    <span class="bus-emoji">🚌</span>
    <div class="topbar-info">
      <div class="topbar-title">Linha <span id="lineLabel">—</span></div>
      <div class="topbar-sub" id="lastUpdate">Aguardando dados…</div>
    </div>
    <div class="live-badge">
      <div class="live-dot offline" id="liveDot"></div>
      <span class="live-label offline" id="liveLabel">OFFLINE</span>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>
  <div class="offline-banner" id="offlineBanner">⚠ Motorista offline ou sem dados</div>

  <!-- Bottom panel -->
  <div class="bottom-panel">
    <div class="info-grid">
      <div class="info-box">
        <div class="info-box-label">Latitude</div>
        <div class="info-box-val" id="pLatVal">—</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Longitude</div>
        <div class="info-box-val" id="pLngVal">—</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Precisão</div>
        <div class="info-box-val" id="pAccVal">—</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Velocidade</div>
        <div class="info-box-val" id="pSpdVal">—</div>
      </div>
    </div>
    <button class="center-btn" onclick="centerMap()">📍 Centralizar no Ônibus</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ─── CONFIGURE SUA CHAVE DO FIREBASE AQUI ──────────────────────────────
       const firebaseConfig = {
  apiKey: "AIzaSyD9Qz_EQwwLbseGGEOPTSw6LokZtr7C7p4",
  authDomain: "circularcma-bae6c.firebaseapp.com",
  projectId: "circularcma-bae6c",
  storageBucket: "circularcma-bae6c.firebasestorage.app",
  messagingSenderId: "449165898696",
  appId: "1:449165898696:web:c577cf6fbc140536e2c6fd"
};
  // ────────────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ── read bus param ──────────────────────────────────
  const params = new URLSearchParams(location.search);
  let busId = params.get('bus');

  if (!busId) {
    document.getElementById('searchOverlay').style.display = 'flex';
  } else {
    startPassengerView(busId);
  }

  window.goTrack = function () {
    const val = document.getElementById('busInput').value.trim();
    if (!val) return;
    location.href = `?bus=${encodeURIComponent(val)}`;
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.goTrack?.();
  });

  // ── Map setup ───────────────────────────────────────
  let map, busMarker, firstLoad = true;

  function startPassengerView(id) {
    document.getElementById('appShell').style.display = 'flex';
    document.getElementById('lineLabel').textContent = id;

    map = L.map('map', { zoomControl: true, attributionControl: false }).setView([-15.8, -47.9], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(map);

    // custom bus icon
    const busIcon = L.divIcon({
      html: `<div style="
        background: linear-gradient(135deg,#f97316,#fbbf24);
        border-radius: 50%;
        width: 44px; height: 44px;
        display: flex; align-items:center; justify-content:center;
        font-size: 22px;
        box-shadow: 0 0 0 4px rgba(249,115,22,.3), 0 4px 20px rgba(249,115,22,.5);
        border: 3px solid #fff;
      ">🚌</div>`,
      className: '',
      iconSize: [44, 44],
      iconAnchor: [22, 22]
    });

    busMarker = L.marker([0, 0], { icon: busIcon });

    // listen to Firebase
    const busRef = ref(db, `buses/${id}`);
    let offlineTimer;

    onValue(busRef, (snap) => {
      clearTimeout(offlineTimer);

      if (!snap.exists()) {
        setOffline('Nenhum dado encontrado para esta linha');
        return;
      }

      const { lat, lng, accuracy, speed, updatedAt } = snap.val();

      if (!lat || !lng) { setOffline('Coordenadas inválidas'); return; }

      setOnline();

      const pos = [lat, lng];
      busMarker.setLatLng(pos);
      if (!map.hasLayer(busMarker)) busMarker.addTo(map);

      if (firstLoad) { map.setView(pos, 16); firstLoad = false; }

      document.getElementById('pLatVal').textContent = lat.toFixed(5);
      document.getElementById('pLngVal').textContent = lng.toFixed(5);
      document.getElementById('pAccVal').textContent = accuracy ? `${Math.round(accuracy)} m` : '—';
      document.getElementById('pSpdVal').textContent = speed != null ? `${speed.toFixed(1)} km/h` : '—';

      const now = new Date();
      document.getElementById('lastUpdate').textContent = `Atualizado às ${now.toLocaleTimeString('pt-BR')}`;

      // auto-offline if no update for 30s
      offlineTimer = setTimeout(() => setOffline('Sem atualização há mais de 30s'), 30000);
    });
  }

  function setOnline() {
    document.getElementById('liveDot').className = 'live-dot';
    document.getElementById('liveLabel').className = 'live-label';
    document.getElementById('liveLabel').textContent = 'AO VIVO';
    document.getElementById('offlineBanner').style.display = 'none';
  }

  function setOffline(msg) {
    document.getElementById('liveDot').className = 'live-dot offline';
    document.getElementById('liveLabel').className = 'live-label offline';
    document.getElementById('liveLabel').textContent = 'OFFLINE';
    const banner = document.getElementById('offlineBanner');
    banner.textContent = '⚠ ' + msg;
    banner.style.display = 'block';
  }

  window.centerMap = function () {
    if (busMarker && map.hasLayer(busMarker)) {
      map.flyTo(busMarker.getLatLng(), 16, { animate: true, duration: 1 });
    }
  };
</script>
</body>
</html>
